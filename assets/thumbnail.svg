<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1280" viewBox="0 0 2560 1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17212b"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3846"/>
      <stop offset="100%" stop-color="#232e3c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1280" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="160" x2="2560" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="2560" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="2560" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="640" x2="2560" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="800" x2="2560" y2="800" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="960" x2="2560" y2="960" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="1120" x2="2560" y2="1120" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="1280" y1="0" x2="1280" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="1600" y1="0" x2="1600" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="1920" y1="0" x2="1920" y2="1280" stroke="#fff" stroke-width="1"/>
    <line x1="2240" y1="0" x2="2240" y2="1280" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Gold accent glow -->
  <circle cx="1280" cy="640" r="600" fill="#FFD60A" opacity="0.03" filter="url(#glow)"/>

  <!-- Left section: Text -->
  <g transform="translate(200, 300)">
    <!-- Logo mark -->
    <rect x="0" y="0" width="96" height="96" rx="24" fill="url(#gold)"/>
    <text x="28" y="68" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" fill="#17212b">AI</text>

    <!-- Title -->
    <text x="120" y="72" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="700" fill="#ffffff">AI Earn</text>

    <!-- Tagline -->
    <text x="0" y="200" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="84" font-weight="800" fill="#ffffff">Judge-to-Earn</text>
    <text x="0" y="310" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="400" fill="#8899A6">Swipe to label AI data.</text>
    <text x="0" y="380" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="400" fill="#8899A6">Earn TON instantly.</text>

    <!-- Stats row -->
    <g transform="translate(0, 480)">
      <rect x="0" y="0" width="240" height="88" rx="20" fill="#232e3c" stroke="#2F3B47" stroke-width="1"/>
      <text x="28" y="36" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#54677B" letter-spacing="0.08em">REWARD</text>
      <text x="28" y="70" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#00C805">+0.001 TON</text>

      <rect x="260" y="0" width="240" height="88" rx="20" fill="#232e3c" stroke="#2F3B47" stroke-width="1"/>
      <text x="288" y="36" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#54677B" letter-spacing="0.08em">PER HOUR</text>
      <text x="288" y="70" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FFD60A">~$3.60</text>

      <rect x="520" y="0" width="240" height="88" rx="20" fill="#232e3c" stroke="#2F3B47" stroke-width="1"/>
      <text x="548" y="36" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#54677B" letter-spacing="0.08em">TX FEE</text>
      <text x="548" y="70" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#ffffff">$0.007</text>
    </g>
  </g>

  <!-- Right section: Phone mockup -->
  <g transform="translate(1440, 120)" filter="url(#shadow)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="560" height="1040" rx="64" fill="#1c2733" stroke="#2F3B47" stroke-width="3"/>

    <!-- Status bar -->
    <rect x="40" y="24" width="480" height="48" rx="8" fill="none"/>
    <text x="60" y="56" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="600" fill="#54677B" letter-spacing="0.08em">ACCURACY</text>
    <text x="190" y="56" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#ffffff">94%</text>
    <text x="320" y="56" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#FFD60A">5d</text>
    <text x="420" y="56" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#ffffff">0.42</text>

    <!-- Card -->
    <rect x="32" y="100" width="496" height="680" rx="40" fill="url(#card-grad)" stroke="#2F3B47" stroke-width="1"/>

    <!-- Image placeholder -->
    <rect x="32" y="100" width="496" height="400" rx="40" fill="#232e3c"/>
    <text x="280" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="96" fill="#2F3B47">?</text>

    <!-- Reward badge on card -->
    <rect x="372" y="124" width="136" height="48" rx="24" fill="rgba(0,0,0,0.6)"/>
    <circle cx="400" cy="148" r="10" fill="#FFD60A"/>
    <text x="420" y="156" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="600" fill="#ffffff">+0.001</text>

    <!-- Question text -->
    <text x="64" y="552" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500" fill="#ffffff">Is there a cat in this</text>
    <text x="64" y="592" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500" fill="#ffffff">image?</text>

    <!-- Swipe hints -->
    <g transform="translate(64, 640)">
      <line x1="4" y1="4" x2="20" y2="20" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="4" x2="4" y2="20" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
      <text x="36" y="20" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#54677B">NO</text>
    </g>
    <text x="280" y="660" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600" fill="#54677B" letter-spacing="0.08em">SWIPE</text>
    <g transform="translate(412, 640)">
      <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#54677B">YES</text>
      <polyline points="68,4 80,16 100,0" fill="none" stroke="#00C805" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Reward bar -->
    <rect x="32" y="800" width="496" height="64" rx="16" fill="rgba(0,200,5,0.05)"/>
    <polyline points="56,832 64,840 76,824" fill="none" stroke="#00C805" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="840" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="600" fill="#00C805">+0.002 TON</text>

    <!-- Tab bar -->
    <rect x="0" y="896" width="560" height="144" rx="0" fill="#232e3c"/>
    <line x1="0" y1="896" x2="560" y2="896" stroke="#2F3B47" stroke-width="1"/>

    <!-- Active tab indicator -->
    <rect x="50" y="900" width="56" height="4" rx="2" fill="#FFD60A"/>

    <!-- Tab: Tasks (active) -->
    <g transform="translate(52, 920)" fill="#FFD60A">
      <rect x="0" y="0" width="14" height="14" rx="3"/>
      <rect x="18" y="0" width="14" height="14" rx="3"/>
      <rect x="0" y="18" width="14" height="14" rx="3"/>
      <rect x="18" y="18" width="14" height="14" rx="3"/>
    </g>
    <text x="68" y="984" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="500" fill="#FFD60A">Tasks</text>

    <!-- Tab: Earn -->
    <text x="208" y="954" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" fill="#54677B">$</text>
    <text x="208" y="984" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="500" fill="#54677B">Earn</text>

    <!-- Tab: Rank -->
    <g transform="translate(334, 920)" stroke="#54677B" stroke-width="4" fill="none" stroke-linecap="round">
      <line x1="0" y1="32" x2="0" y2="20"/>
      <line x1="12" y1="32" x2="12" y2="8"/>
      <line x1="24" y1="32" x2="24" y2="16"/>
    </g>
    <text x="348" y="984" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="500" fill="#54677B">Rank</text>

    <!-- Tab: Me -->
    <circle cx="488" cy="936" r="12" fill="none" stroke="#54677B" stroke-width="4"/>
    <text x="488" y="984" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="500" fill="#54677B">Me</text>
  </g>

  <!-- TON logo bottom right -->
  <g transform="translate(2160, 1080)">
    <text x="0" y="48" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500" fill="#54677B">Built on</text>
    <g transform="translate(160, 8)">
      <circle cx="24" cy="24" r="24" fill="#0098EA"/>
      <path d="M17.5 7.5H6.5c-1.5 0-2.4 1.6-1.7 2.9l5 8.6c.3.6 1.1.6 1.5 0l5-8.6c.7-1.3-.2-2.9-1.7-2.9z" fill="white" transform="scale(1.6) translate(3, 3)"/>
    </g>
    <text x="216" y="48" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700" fill="#0098EA">TON</text>
  </g>

  <!-- Telegram badge -->
  <g transform="translate(2160, 1160)">
    <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#3A4854">Telegram Mini App</text>
  </g>
</svg>
