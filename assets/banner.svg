<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17212b"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3846"/>
      <stop offset="100%" stop-color="#232e3c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Gold accent glow -->
  <circle cx="640" cy="320" r="300" fill="#FFD60A" opacity="0.03" filter="url(#glow)"/>

  <!-- Left section: Text -->
  <g transform="translate(100, 180)">
    <!-- Logo mark -->
    <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#gold)"/>
    <text x="14" y="34" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="800" fill="#17212b">AI</text>

    <!-- Title -->
    <text x="60" y="36" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="#ffffff">AI Earn</text>

    <!-- Tagline -->
    <text x="0" y="100" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="42" font-weight="800" fill="#ffffff">Judge-to-Earn</text>
    <text x="0" y="155" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#8899A6">Swipe to label AI data.</text>
    <text x="0" y="190" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="400" fill="#8899A6">Earn TON instantly.</text>

    <!-- Stats row -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="120" height="44" rx="10" fill="#232e3c" stroke="#2F3B47" stroke-width="1"/>
      <text x="14" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#54677B" letter-spacing="0.08em">REWARD</text>
      <text x="14" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#00C805">+0.001 TON</text>

      <rect x="130" y="0" width="120" height="44" rx="10" fill="#232e3c" stroke="#2F3B47" stroke-width="1"/>
      <text x="144" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#54677B" letter-spacing="0.08em">PER HOUR</text>
      <text x="144" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#FFD60A">~$3.60</text>

      <rect x="260" y="0" width="120" height="44" rx="10" fill="#232e3c" stroke="#2F3B47" stroke-width="1"/>
      <text x="274" y="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#54677B" letter-spacing="0.08em">TX FEE</text>
      <text x="274" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#ffffff">$0.007</text>
    </g>
  </g>

  <!-- Right section: Phone mockup -->
  <g transform="translate(720, 60)" filter="url(#shadow)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="280" height="520" rx="32" fill="#1c2733" stroke="#2F3B47" stroke-width="2"/>

    <!-- Status bar -->
    <rect x="20" y="12" width="240" height="24" rx="4" fill="none"/>
    <text x="30" y="28" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#54677B" letter-spacing="0.08em">ACCURACY</text>
    <text x="95" y="28" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#ffffff">94%</text>
    <text x="160" y="28" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#FFD60A">5d</text>
    <text x="210" y="28" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#ffffff">0.42</text>

    <!-- Card -->
    <rect x="16" y="50" width="248" height="340" rx="20" fill="url(#card-grad)" stroke="#2F3B47" stroke-width="1"/>

    <!-- Image placeholder -->
    <rect x="16" y="50" width="248" height="200" rx="20" fill="#232e3c"/>
    <text x="140" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" fill="#2F3B47">?</text>

    <!-- Reward badge on card -->
    <rect x="186" y="62" width="68" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
    <circle cx="200" cy="74" r="5" fill="#FFD60A"/>
    <text x="210" y="78" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#ffffff">+0.001</text>

    <!-- Question text -->
    <text x="32" y="276" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" fill="#ffffff">Is there a cat in this</text>
    <text x="32" y="296" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" fill="#ffffff">image?</text>

    <!-- Swipe hints -->
    <g transform="translate(32, 320)">
      <!-- X icon -->
      <line x1="2" y1="2" x2="10" y2="10" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
      <line x1="10" y1="2" x2="2" y2="10" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
      <text x="18" y="10" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#54677B">NO</text>
    </g>
    <text x="140" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="600" fill="#54677B" letter-spacing="0.08em">SWIPE</text>
    <g transform="translate(206, 320)">
      <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#54677B">YES</text>
      <!-- Check icon -->
      <polyline points="34,2 40,8 50,0" fill="none" stroke="#00C805" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Reward bar -->
    <rect x="16" y="400" width="248" height="32" rx="8" fill="rgba(0,200,5,0.05)"/>
    <polyline points="28,416 32,420 38,412" fill="none" stroke="#00C805" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="420" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#00C805">+0.002 TON</text>

    <!-- Tab bar -->
    <rect x="0" y="448" width="280" height="72" rx="0" fill="#232e3c"/>
    <line x1="0" y1="448" x2="280" y2="448" stroke="#2F3B47" stroke-width="1"/>

    <!-- Active tab indicator -->
    <rect x="25" y="450" width="28" height="2" rx="1" fill="#FFD60A"/>

    <!-- Tab: Tasks (active) -->
    <g transform="translate(26, 460)" fill="#FFD60A">
      <rect x="0" y="0" width="7" height="7" rx="1.5"/>
      <rect x="9" y="0" width="7" height="7" rx="1.5"/>
      <rect x="0" y="9" width="7" height="7" rx="1.5"/>
      <rect x="9" y="9" width="7" height="7" rx="1.5"/>
    </g>
    <text x="34" y="492" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="500" fill="#FFD60A">Tasks</text>

    <!-- Tab: Earn -->
    <text x="104" y="477" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#54677B">$</text>
    <text x="104" y="492" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="500" fill="#54677B">Earn</text>

    <!-- Tab: Rank -->
    <g transform="translate(167, 460)" stroke="#54677B" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="0" y1="16" x2="0" y2="10"/>
      <line x1="6" y1="16" x2="6" y2="4"/>
      <line x1="12" y1="16" x2="12" y2="8"/>
    </g>
    <text x="174" y="492" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="500" fill="#54677B">Rank</text>

    <!-- Tab: Me -->
    <circle cx="244" cy="468" r="6" fill="none" stroke="#54677B" stroke-width="2"/>
    <text x="244" y="492" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" font-weight="500" fill="#54677B">Me</text>
  </g>

  <!-- TON logo bottom right -->
  <g transform="translate(1080, 540)">
    <text x="0" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" fill="#54677B">Built on</text>
    <g transform="translate(80, 4)">
      <circle cx="12" cy="12" r="12" fill="#0098EA"/>
      <path d="M17.5 7.5H6.5c-1.5 0-2.4 1.6-1.7 2.9l5 8.6c.3.6 1.1.6 1.5 0l5-8.6c.7-1.3-.2-2.9-1.7-2.9z" fill="white" transform="scale(0.8) translate(3, 3)"/>
    </g>
    <text x="108" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="700" fill="#0098EA">TON</text>
  </g>

  <!-- Telegram badge -->
  <g transform="translate(1080, 580)">
    <text x="0" y="16" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="400" fill="#3A4854">Telegram Mini App</text>
  </g>
</svg>
